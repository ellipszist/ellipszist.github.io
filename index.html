<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/styles.min.css">
        <title>'ELL Official Store</title>
    </head>
    <body>
        <h1 class="title-shop">'ELL OFFICIAL STORE</h1>
        <main class="main bd-grid">
            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">GOG / Steam - PC</span>
                        <span class="card__preci card__preci--now"><ion-icon name="logo-apple" role="img" class="md hydrated" aria-label="logo apple"></ion-icon> <ion-icon name="logo-windows" role="img" class="md hydrated" aria-label="logo windows"></ion-icon> <ion-icon name="logo-tux" role="img" class="md hydrated" aria-label="logo tux"></ion-icon></span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7052" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">Play Store - มือถือ</span>
                        <span class="card__preci card__preci--now">android <sub><ion-icon name="logo-android" style="color:#3DDC84; font-size:1.5rem;"></ion-icon</sub></span>
                    </div>
                    <a href="https://play.google.com/store/apps/details?id=com.ell.smapiinstaller" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Expanded">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY <a style="color: #e0004b;">EXPANDED</a></p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">GOG / Steam - PC</span>
                        <span class="card__preci card__preci--now"><ion-icon name="logo-apple" role="img" class="md hydrated" aria-label="logo apple"></ion-icon> <ion-icon name="logo-windows" role="img" class="md hydrated" aria-label="logo windows"></ion-icon> <ion-icon name="logo-tux" role="img" class="md hydrated" aria-label="logo tux"></ion-icon></span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7255" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Expanded Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY <a style="color: #e0004b;">EXPANDED</a></p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">Play Store - มือถือ</span>
                        <span class="card__preci card__preci--now">android <sub><ion-icon name="logo-android" style="color:#3DDC84; font-size:1.5rem;"></ion-icon></sub></span>
                    </div>
                    <a href="#" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>
        </main>

        <!-- ICONS -->
        <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
    </body>
</html>
