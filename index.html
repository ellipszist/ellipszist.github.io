<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/styles.min.css">
        <title>'ELL Official Store</title>
    </head>
    <body>
        <h1 class="title-shop">'ELL OFFICIAL STORE</h1>
        <main class="main bd-grid">
            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" width="180" height="162" alt="Stardew Valley">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">ภาษาไทยเกมหลัก</span>
                        <span class="card__preci card__preci--now"><ion-icon name="logo-apple"></ion-icon> <ion-icon name="logo-windows"></ion-icon></ion-icon> <ion-icon name="logo-tux"></ion-icon></span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7052" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" width="180" height="162" alt="Stardew Valley Expanded">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY <b style="color: #e0004b;">EXPANDED</b></p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">ภาษาไทย SVE</span>
                        <span class="card__preci card__preci--now"><ion-icon name="logo-apple"></ion-icon> <ion-icon name="logo-windows"></ion-icon></ion-icon> <ion-icon name="logo-tux"></ion-icon></span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7255" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>
        </main>

        <main class="mobile bd-grid">
            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" width="180" height="162" alt="Stardew Valley Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">ภาษาไทยเกมหลัก</span>
                        <span class="card__preci card__preci--now">android <sub><ion-icon name="logo-android" style="color:#3DDC84; font-size:1.5rem;"></ion-icon</sub></span>
                    </div>
                    <a href="https://play.google.com/store/apps/details?id=com.ell.smapiinstaller" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" width="180" height="162" alt="Stardew Valley Expanded Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY <b style="color: #e0004b;">EXPANDED</b></p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">ภาษาไทย SVE</span>
                        <span class="card__preci card__preci--now">android <sub><ion-icon name="logo-android" style="color:#3DDC84; font-size:1.5rem;"></ion-icon></sub></span>
                    </div>
                    <a href="https://www.facebook.com/BlackChickCommunity/posts/315579653635891" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" width="180" height="162" alt="Help Center">
                </div>
                <div class="card__name">
                    <p>HELP CENTER</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="help-circle-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">ถาม-ตอบ ทุกปัญหาเรื่องเกม</span>
                        <span class="card__preci card__preci--now"><ion-icon name="laptop-outline"></ion-icon> <ion-icon name="logo-apple"></ion-icon> <ion-icon name="logo-windows"></ion-icon></ion-icon> <ion-icon name="logo-tux"></ion-icon> <ion-icon name="phone-portrait-outline"></ion-icon> <ion-icon name="logo-android"></ion-icon></span>
                    </div>
                    <a href="https://www.facebook.com/groups/112249016352769" class="card__icon"><ion-icon name="logo-facebook"></ion-icon></a>
                </div>
            </article>
        </main>

        <!-- ICONS -->
        <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    </body>
</html>
