<!doctype html>
<html ⚡4ads>
<head>
  <title>ชุดภาษาไทยสำหรับเกม Stardew Valley</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <script async src="https://cdn.ampproject.org/amp4ads-v0.js"></script>
  <style amp4ads-boilerplate>body{visibility:hidden;margin: 0;background-color:#FDC629;}</style>
  <script async custom-element="amp-fit-text" src="https://cdn.ampproject.org/v0/amp-fit-text-0.1.js"></script>
  <!-- The AMP Story runtime is responsible for rendering the call to action button. 
  The call to action button must be configured from a predefined set of [choices](https://www.ampproject.org/docs/ads/story_ads_best_practices). -->
  <meta name="amp-cta-type" content="ติดตั้ง">
  <!-- amp-cta-url specifies where the user is directed once clicking upon the call to action button. -->
  <meta name="amp-cta-url" content="https://www.nexusmods.com/stardewvalley/mods/7052">

  <style amp-custom>
    /* thai */
    @font-face {
      font-family: 'Sriracha';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Sriracha'), local('Sriracha-Regular'), url(https://fonts.gstatic.com/s/sriracha/v4/0nkrC9D4IuYBgWcI9NbLTwHSoQ.woff2) format('woff2');
      unicode-range: U+0E01-0E5B, U+200C-200D, U+25CC;
    }
    /* vietnamese */
    @font-face {
      font-family: 'Sriracha';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Sriracha'), local('Sriracha-Regular'), url(https://fonts.gstatic.com/s/sriracha/v4/0nkrC9D4IuYBgWcI9NbQTwHSoQ.woff2) format('woff2');
      unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+1EA0-1EF9, U+20AB;
    }
    /* latin-ext */
    @font-face {
      font-family: 'Sriracha';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Sriracha'), local('Sriracha-Regular'), url(https://fonts.gstatic.com/s/sriracha/v4/0nkrC9D4IuYBgWcI9NbRTwHSoQ.woff2) format('woff2');
      unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }
    /* latin */
    @font-face {
      font-family: 'Sriracha';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Sriracha'), local('Sriracha-Regular'), url(https://fonts.gstatic.com/s/sriracha/v4/0nkrC9D4IuYBgWcI9NbfTwE.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    * {
      box-sizing: border-box;
    }

    .container {
      align-items: center;
      background-color: #FDC629;
      display: flex;
      flex-direction: column;
      height: 100vh;
      justify-content: flex-end;
      width: 100vw;
    }

    .logo {
      border-radius: 1.5vh;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
      height: 10vh;
      margin-bottom: 3vh;
      width: 10vh;
    }

    .text-box {
      height: 12vh;
      font-family: 'Sriracha', sans-serif;
      font-weight: 400;
      margin-bottom: 3vh;
      position: relative;
      text-align: center;
      width: 80vw;
    }

    .app-img-container {
      /* 65vh + border width */
      height: 65vh;
      /* 65 * (9/16) ~= 37vh + (2 * border width) */
      width: 67vh;
    }

    .app-img {
      background-color: white;
      border-radius: 1vh 1vh 1vh 1vh;
      border-color: #fff;
      border-style: solid;
      border-width: 2vh 2vh 2vh 2vh;
      box-shadow: 0 15px 80px rgba(0, 0, 0, 0.24);
      box-sizing: content-box;
    }

    a.i-amphtml-story-ad-link {
      font-family: 'Sriracha', sans-serif!important;
    }
  </style>
</head>
<body>
  <!-- Recommended image format type for images are jpg, png. Images should not be bigger than 5 mb. -->
  <div class="container">
    <!-- Recommended logo aspect ratio is 1:1. Replace app-install-logo-blurred.jpg with your own logo. -->
    <amp-img alt="logo"
        class="logo"
        src="app-install-logo.png"
        width="100"
        height="100"
        layout="responsive">
    </amp-img>
    <div class="text-box">
      <!-- Recommended text font size is min 16pt and max 64pt. Color can be flexible. -->
      <amp-fit-text
        id="text"
        width="70"
        height="12"
        layout="fill"
        min-font-size="16"
        max-font-size="64">
          ชุดภาษาไทย สำหรับเกม Stardew Valley<div>จัดทำ/แปล โดย <font color="#2188ff">Translator Army</font></div>
      </amp-fit-text>
    </div>
    <div class="app-img-container">
      <!-- Replace app-install-hero-blurred.jpg with your own asset. -->
      <amp-img alt="app image"
          class="app-img"
          src="app-install-hero.png"
          width="800"
          height="450"
          layout="responsive">
      </amp-img>
    </div>
  </div>
</body>
</html>
