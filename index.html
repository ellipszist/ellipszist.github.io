<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="assets/css/styles.css">
        <title>'ELL STORE</title>
    </head>
    <body>
        <h1 class="title-shop">'ELL STORE</h1>
        <main class="main bd-grid">
            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">GOG / Steam</span>
                        <span class="card__preci card__preci--now">สำหรับ PC</span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7052" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">Google Play Store</span>
                        <span class="card__preci card__preci--now">android <ion-icon name="logo-android"></ion-icon></span>
                    </div>
                    <a href="https://play.google.com/store/apps/details?id=com.ell.smapiinstaller" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Expanded">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY EXPANDED</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="laptop-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">GOG / Steam</span>
                        <span class="card__preci card__preci--now">สำหรับ PC</span>
                    </div>
                    <a href="https://www.nexusmods.com/stardewvalley/mods/7255" class="card__icon"><ion-icon name="arrow-down-circle-outline"></ion-icon></a>
                </div>
            </article>

            <article class="card">
                <div class="card__img">
                    <img src="assets/img/img1.png" alt="Stardew Valley Expanded Mobile">
                </div>
                <div class="card__name">
                    <p>STARDEW VALLEY EXPANDED</p>
                </div>
                <div class="card__precis">
                    <div class="card__icon" ><ion-icon name="phone-portrait-outline"></ion-icon></div>
                    <div>
                        <span class="card__preci card__preci--before">Google Play Store</span>
                        <span class="card__preci card__preci--now">android <ion-icon name="logo-android"></ion-icon></span>
                    </div>
                    <a href="https://play.google.com/store/apps/details?id=com.ellxsve.smapiinstaller" class="card__icon"><ion-icon name="logo-google-playstore"></ion-icon></a>
                </div>
            </article>
        </main>

        <!-- ICONS -->
        <script src="https://unpkg.com/ionicons@5.4.0/dist/ionicons.js"></script>
    </body>
</html>
