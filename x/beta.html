    <div class="no-results">ไม่พบผลลัพธ์</div>

    <script>
      document.getElementById("query").addEventListener("input", function() {
        const query = this.value;
        const modContainers = document.querySelectorAll("#mods .mod-container");
        const noResults = document.querySelector(".no-results");

        let results = false;

        for (let i = 0; i < modContainers.length; i++) {
          if (modContainers[i].querySelector("img").alt.toLowerCase().includes(query.toLowerCase())) {
            modContainers[i].style.display = "inline-block";
            results = true;
          } else {
            modContainers[i].style.display = "none";
          }
        }

        if (results) {
          noResults.style.display = "none";
        } else {
          noResults.style.display = "block";
        }
      });
    </script>
