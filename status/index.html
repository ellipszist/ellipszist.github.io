<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ELL Status</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<ul class="skills-bar-container">

  <li>
    <div class="progressbar-title">
      <h3>Stardew Valley</h3>
      <span class="percent" id="sdv-pourcent"></span>
    </div>
    <div class="bar-container">
      <span class="progressbar progressred" id="progress-sdv"></span>
    </div>
  </li>

  <li>
    <div class="progressbar-title">
      <h3>Stardew Valley Expanded</h3>
      <span class="percent" id="sve-pourcent"></span>
    </div>
    <div class="bar-container">
      <span class="progressbar progressblue" id="progress-sve"></span>
    </div>
  </li>

  <li>
    <div class="progressbar-title">
      <h3>Pharaoh: A New Era</h3>
      <span class="percent" id="pane-pourcent"></span>
    </div>
    <div class="bar-container">
      <span class="progressbar progresspurple" id="progress-pane"></span>
    </div>
  </li>

  <li>
    <div class="progressbar-title">
      <h3>Have a Nice Death</h3>
      <span class="percent" id="hand-pourcent"></span>
    </div>
    <div class="bar-container">
      <span class="progressbar progressorange" id="progress-hand"></span>
    </div>
  </li>

  <li>
    <div class="progressbar-title">
      <h3>Hades</h3>
      <span class="percent" id="hades-pourcent"></span>
    </div>
    <div class="bar-container">
      <span class="progressbar progressgreen" id="progress-hades"></span>
    </div>
  </li>

</ul>
<script src="./script.js"></script>
</body>
</html>
