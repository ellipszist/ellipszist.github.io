<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ดาวน์โหลดม็อดภาษาไทยสำหรับเกม Overcooked! 2</title>
  <link href="https://fonts.googleapis.com/css?family=Sriracha:400" rel="stylesheet">
  <style>
    a {
      color: #a43426;
      text-decoration: none;
    }

    a:hover {
      color: #fff;
      text-shadow: 1px 1px 1px #00BCD4, -1px -1px 1px #00BCD4, -1px 1px 1px #00BCD4, 1px -1px 1px #00BCD4;
    }

    hr {
      border: none;
      border-bottom: 1.5px solid #fff;
    }

    body {
      background: #ffecd9;
      display: grid;
      height: 100vh;
      margin: 0;
      place-items: center;
      background-image: url("i/overcooked2BG1.jpg");
      background-position: top center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    button {
      -webkit-appearance: none;
      background: -webkit-gradient(to right, #a2ccb6 0%, #fceeb5 50%, #ee786e 100%);
      background: linear-gradient(to right, #a2ccb6 0%, #fceeb5 50%, #ee786e 100%);
      background-size: 500%;
      border: none;
      border-radius: 3px;
      box-shadow: 0.5rem 0.5rem 1rem rgb(0 0 0 / 15%);
      color: #a43426;
      text-shadow: 1px 1px 1px #fff, -1px -1px 1px #fff, -1px 1px 1px #fff, 1px -1px 1px #fff;
      cursor: pointer;
      font: 1.5em Sriracha, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* height: 4rem; */
      letter-spacing: 0.05em;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      /* width: 15rem; */
      padding: 1.5rem 2rem;
    }

    button:hover {
      animation-name: gradient;
      -webkit-animation-name: gradient;
      animation-duration: 2s;
      -webkit-animation-duration: 2s;
      animation-iteration-count: 1;
      -webkit-animation-iteration-count: 1;
      animation-fill-mode: forwards;
      -webkit-animation-fill-mode: forwards;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100%;
      }
    }
  </style>
</head>
<body>
  <button>
    <b>
      ม็อดภาษาไทยเกม <b style="color: #fff; text-shadow: 1px 1px 1px #a43426, -1px -1px 1px #a43426, -1px 1px 1px #a43426, 1px -1px 1px #a43426;">Overcooked! </b><b style="color: #ffa200; text-shadow: 1px 1px 1px #a43426, -1px -1px 1px #a43426, -1px 1px 1px #a43426, 1px -1px 1px #a43426;">2</b><br>
      ( เลือก 1 รายการ )<br>
    </b><hr>
    <a href="https://ellipszist.github.io/releases/mods/Overcooked_2_For_Steam_by_Sabi.zip">
      1. สำหรับเกมบน Steam
    </a><hr>
    <a href="https://ellipszist.github.io/releases/mods/Overcooked_2_For_Steam_Crossplay_by_Sabi.zip">
      2. สำหรับเกมบน Steam<br>แต่ต้องการเล่นกับเพื่อนในระบบอื่นๆ เช่น Epic
    </a><br>
    <a href="#" style="/* color: #EC407A; */">
      (ต้องเปิดใช้งาน Crossplay ใน branch ของ Steam ด้วย)
    </a><hr>
    <a href="https://ellipszist.github.io/releases/mods/Overcooked_2_For_Epic_by_Sabi.zip">
      3. สำหรับเกมบน Epic
    </a>
  </button>
</body>
</html>
