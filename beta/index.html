    <main id="content" role="main" class="main archive-listing">
      <amp-state id="mods">
        <script type="application/json">
          {
            "genre": "latest",
            "filter": "modder"
          }
        </script>
      </amp-state>
      <amp-img
        class="archive-listing-banner xs-hide sm-hide"
        src="https://pbs.twimg.com/profile_banners/822842783664783363/1608034155/1500x500"
        width="1500"
        height="500"
        layout="responsive"
        alt="Mod listing"
        noloading=""
        ><div placeholder="" class="archive-loader"></div
      ></amp-img>
      <h3 class="target">
        <a class="target-anchor" id="top"></a>
        <amp-position-observer on="enter:hideAnim.start; exit:showAnim.start" layout="nodisplay">
        </amp-position-observer>
      </h3>

          <amp-animation id="showAnim" layout="nodisplay">
            <script type="application/json">
              {
                "duration": "200ms",
                 "fill": "both",
                 "iterations": "1",
                 "direction": "alternate",
                 "animations": [
                   {
                     "selector": "#scrollToTopButton",
                     "keyframes": [
                       { "opacity": "1", "visibility": "visible" }
                     ]
                   }
                 ]
              }
            </script>
          </amp-animation>
          <amp-animation id="hideAnim" layout="nodisplay">
            <script type="application/json">
              {
               "duration": "200ms",
                 "fill": "both",
                 "iterations": "1",
                 "direction": "alternate",
                 "animations": [
                   {
                     "selector": "#scrollToTopButton",
                     "keyframes": [
                       { "opacity": "0", "visibility": "hidden" }
                     ]
                   }
                 ]
              }
            </script>
          </amp-animation>

          <button id="scrollToTopButton" on="tap:top.scrollTo(duration=200)" class="scrollToTop">↑</button>

            >

                type="radio"
                value=""
                name="genre"
                id="latest"
                class="relative"

              <label for="latest" class="" aria-hidden="true">ล่าสุด</label>

        <div class="col-12 md-col-7 pt2 pb3 md-px4 md-pt1 md-pb7">
          <div
            class="md-archive-header relative md-flex flex-wrap items-center md-mx0 md-mb2"
          >
            <h1 class="h3 mb2 md-mt2 md-mb2 md-ml0 flex-auto px2">เกมแปลไทย</h1>
            <amp-position-observer on="enter:hideAnim.start; exit:showAnim.start" layout="nodisplay">
            </amp-position-observer>
            <div class="archive-listing-filters pt2 pb2 mb3 md-mb0">
              <div
                class="archive-select-wrapper inline-block md-mr1 pl2 md-hide lg-hide"
              >
                <label for="categories" class="bold caps h6 md-h7">แสดง:</label>
                <select
                  name="categories"
                  id="categories"
                  class="archive-select h6 md-h7"
                  on="change: AMP.setState({mods: {genre: event.value}})"
                >
                  <option value="latest">ล่าสุด</option>
                  <option value="indie">อินดี้</option>
                  <option value="action">แอ็คชัน</option>
                  <option value="adventure">ผจญภัย</option>
                  <option value="casual">แคชชวล</option>
                  <option value="horror">สยองขวัญ</option>
                  <option value="rpg">สวมบทบาท</option>
                  <option value="simulation">จำลองสถานการณ์</option>
                  <option value="strategy">กลยุทธ์</option>
                  <option value="thaidub">พากย์ไทย</option>
                  <option value="wip">กำลังแปล</option>
                </select>
              </div>
              <div class="archive-select-wrapper inline-block">
                <label for="source" class="bold caps h6 md-h7">แปลโดย:</label>
                <select
                      name="source"
                      id="source"
                      class="archive-select h6 md-h7"
                      on="change: AMP.setState({mods: {filter: event.value}})"
                    >
                  <option value="modder">เพจแปล</option>
                  <option value="official">ทางการ</option>
                </select>
              </div>
            </div>
          </div>

          <amp-list
            class="mx1 md-mxn1"
            [src]="'api/' + mods.filter + '/' + mods.genre + '-mods.json'"
            src="api/modder/latest-mods.json"
            [height]="items.length * 34"
            height="1000"
            width="300"
            layout="responsive"
          >
            <template type="amp-mustache">
              <a
                href="{{url}}"
                target="_blank"
                class="archive-listing-mod text-decoration-none inline-block col-6 md-col-4 lg-col-3 px1 mb2 md-mb4 relative {{style}}"
              >
                <div class="flex flex-column justify-between">
                  <div>
                    <amp-img
                      class="archive-listing-mod-image mb2"
                      src="https://cdn.cloudflare.steamstatic.com/steam/apps/{{app_id}}/library_600x900.jpg"
                      width="300"
                      height="450"
                      layout="responsive"
                      alt="{{ name }}"
                      noloading=""
                      ><div placeholder="" class="archive-loader"></div
                    ></amp-img>
                  </div>
                </div>
              </a>
            </template>
          </amp-list>
        </div>
      </section>
